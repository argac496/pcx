<!DOCTYPE html>
<!-- saved from url=(0047)https://ebadrus.my.id/materi/SR_PLAYGROUND.html -->
<html lang="id"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR MASTER PLAYGROUND - Live Code 🕹️</title>
    <link href="./SR MASTER PLAYGROUND - Live Code 🕹️_files/css2" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1e272e;
            --sr-green: #8ebc46;
            --sr-purple: #4834d4;
            --accent: #eb4d4b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Nav Header */
        nav {
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--sr-green);
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--sr-green);
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        /* Main Workspace */
        main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* Left Side: Editor */
        .editor-container {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 4px solid #333;
            background: #2d3436;
        }

        .editor-header {
            padding: 10px 20px;
            background: #111;
            font-size: 1rem;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-header span {
            color: var(--sr-green);
        }

        .editor-header.css-label span {
            color: var(--sr-purple);
        }

        textarea {
            flex: 1;
            background: transparent;
            color: #d1d8e0;
            border: none;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            resize: none;
            outline: none;
            line-height: 1.4;
        }

        /* Right Side: Preview */
        .preview-container {
            width: 50%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            padding: 10px 20px;
            background: #eee;
            color: #333;
            font-weight: 800;
            border-bottom: 1px solid #ccc;
            display: flex;
            align-items: center;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        /* Level Selector Sidebar */
        .presets {
            width: 250px;
            background: #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 2px solid #333;
        }

        .presets h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #666;
        }

        button.preset-btn {
            background: #333;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 700;
            transition: 0.3s;
        }

        button.preset-btn:hover {
            background: var(--sr-green);
            color: black;
        }

        button.action-btn {
            background: var(--sr-green);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
        }

        button.clear-btn {
            background: var(--accent);
            color: white;
        }

        /* Animation */
        .flash {
            animation: flashEffect 0.5s ease-out;
        }

        @keyframes flashEffect {
            from {
                opacity: 0.5;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">SR MAESTRO PLAYGROUND 🕹️</div>
        <div class="controls">
            <button class="action-btn clear-btn" onclick="clearCode()">KOSONGKAN</button>
            <button class="action-btn" onclick="copyCode()">SALIN KODE</button>
        </div>
    </nav>

    <main>
        <!-- EDITORS -->
        <div class="editor-container">
            <div class="editor-header"><span>HTML EDITOR</span> 📄</div>
            <textarea id="htmlInput" placeholder="Ketik HTML di sini..." oninput="updatePreview()">&lt;h1&gt;Halo Dunia!&lt;/h1&gt;&lt;p&gt;Ayo belajar coding.&lt;/p&gt;</textarea>

            <div class="editor-header css-label" style="border-top: 4px solid #111;"><span>CSS EDITOR</span> 🎨</div>
            <textarea id="cssInput" placeholder="Ketik CSS di sini..." oninput="updatePreview()">h1 { color: #8ebc46; }
p { font-size: 24px; }</textarea>
        </div>

        <!-- PREVIEW -->
        <div class="preview-container">
            <div class="preview-header">HASIL VISUAL (LIVE RENDER) 🖥️</div>
            <iframe id="preview" src="./SR MASTER PLAYGROUND - Live Code 🕹️_files/saved_resource.html"></iframe>
        </div>

        <!-- PRESETS -->
        <div class="presets">
            <h3>TEMPLATES HTML 📄</h3>
            <button class="preset-btn" onclick="loadTemplate(&#39;h1&#39;, &#39;&lt;h1&gt;Halo Sekolah Rakyat&lt;/h1&gt;&#39;)">LV 0:
                Judul</button>
            <button class="preset-btn" onclick="loadTemplate(&#39;p&#39;, &#39;&lt;p&gt;Ini adalah cerita pendek saya...&lt;/p&gt;&#39;)">LV 1:
                Paragraf</button>
            <button class="preset-btn" onclick="loadTemplate(&#39;a&#39;, &#39;&lt;a href=&quot;#&quot;&gt;Link Klik Disini&lt;/a&gt;&#39;)">LV 2:
                Link</button>
            <button class="preset-btn" onclick="loadTemplate(&#39;ul&#39;, &#39;&lt;ul&gt;\n  &lt;li&gt;Mobil&lt;/li&gt;\n  &lt;li&gt;Robot&lt;/li&gt;\n&lt;/ul&gt;&#39;)">LV
                3: Daftar</button>
            <button class="preset-btn" onclick="loadTemplate(&#39;nest&#39;, &#39;&lt;p&gt;Saya &lt;b&gt;&lt;i&gt;Juara&lt;/i&gt;&lt;/b&gt; Coding&lt;/p&gt;&#39;)">LV
                4: Nesting</button>
            <button class="preset-btn" onclick="loadTemplate(&#39;empty&#39;, &#39;&#39;)">LV 5: Final Boss</button>

            <h3 style="margin-top:20px;">TEMPLATES CSS 🎨</h3>
            <button class="preset-btn" onclick="loadCSS(&#39;p {\n  color: red;\n}&#39;)">LV 0: Warna Teks</button>
            <button class="preset-btn" onclick="loadCSS(&#39;div {\n  background-color: yellow;\n}&#39;)">LV 1: Warna
                Latar</button>
            <button class="preset-btn" onclick="loadCSS(&#39;h1 {\n  font-size: 80px;\n}&#39;)">LV 2: Ukuran Font</button>
            <button class="preset-btn" onclick="loadCSS(&#39;div {\n  border: 10px solid black;\n  padding: 20px;\n}&#39;)">LV
                3: Bingkai</button>
            <button class="preset-btn" onclick="loadCSS(&#39;div {\n  border: 1px solid red;\n  border-radius: 50px;\n  margin: 20px;\n}&#39;)">LV 4:
                Bulat &amp; Jarak</button>
            <button class="preset-btn" onclick="loadCSS(&#39;&#39;)">LV 5: Final Boss</button>
        </div>
    </main>

    <script>
        const htmlEditor = document.getElementById('htmlInput');
        const cssEditor = document.getElementById('cssInput');
        const preview = document.getElementById('preview');

        function updatePreview() {
            const html = htmlEditor.value;
            const css = `<style>${cssEditor.value}</style>`;
            const source = `
                <!DOCTYPE html>
                <html>
                <head>
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Outfit', sans-serif; padding: 20px; font-size: 1.5rem; word-wrap: break-word; }
                        h1 { font-size: 3rem; margin-top: 0; }
                    </style>
                    ${css}
                </head>
                <body>${html}</body>
                </html>
            `;

            const doc = preview.contentDocument || preview.contentWindow.document;
            doc.open();
            doc.write(source);
            doc.close();
        }

        function loadTemplate(type, code) {
            htmlEditor.value = code;
            htmlEditor.classList.add('flash');
            setTimeout(() => htmlEditor.classList.remove('flash'), 500);
            updatePreview();
        }

        function loadCSS(code) {
            cssEditor.value = code;
            cssEditor.classList.add('flash');
            setTimeout(() => cssEditor.classList.remove('flash'), 500);
            updatePreview();
        }

        function clearCode() {
            if (confirm('Hapus semua kode?')) {
                htmlEditor.value = '';
                cssEditor.value = '';
                updatePreview();
            }
        }

        function copyCode() {
            const fullCode = `<!-- HTML -->\n${htmlEditor.value}\n\n/* CSS */\n${cssEditor.value}`;
            navigator.clipboard.writeText(fullCode).then(() => {
                alert('Kode berhasil disalin ke Clipboard!');
            });
        }

        // Initial update
        window.onload = updatePreview;
    </script>


</body></html>
