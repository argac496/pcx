<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Orang Random</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e24;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h2 {
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .video-container {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
            max-width: 90%;
        }

        video {
            display: block;
        }
    </style>
</head>
<body>

    <h2>Video Orang Random</h2>

    <div class="video-container">
        <!-- Menggunakan sampel video publik dari pexels untuk demo -->
        <video width="640" height="360" controls autoplay loop muted>
            <source src="https://player.vimeo.com/external/371433846.sd.mp4?s=236da2f3c0ee27ad9e82310684cca321117afae0&profile_id=165&oauth2_token_id=57447761" type="video/mp4">
            Browser kamu tidak mendukung tag video HTML5.
        </video>
    </div>

</body>
</html>
